spring.application.name=qrsystem

# Database Settings
spring.datasource.url=jdbc:mysql://localhost:3306/restaurant_qr_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server / Port
server.port=8082

# File Upload Settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload-dir=./uploads
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
spring.mvc.static-path-pattern=/uploads/**

# Security & Environment Configuration
app.jwt.secret=RestaurantQROrderSystemVerySecretKeyForAdminAuthAndMore
app.backend-url=http://localhost:8082