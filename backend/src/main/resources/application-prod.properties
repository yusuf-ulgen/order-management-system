spring.application.name=qrsystem

# Database Settings
spring.datasource.url=jdbc:mysql://${DATABASE_HOST}:${DATABASE_PORT:4000}/${DATABASE_NAME}?useSSL=true&allowPublicKeyRetrieval=true&verifyServerCertificate=false
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate & JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# HikariCP Connection Pool Settings (Optimized for 512MB RAM)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
# Remove explicit dialect to let Hibernate 6 auto-detect correctly

# Server / Port
# Render provides the port via the PORT environment variable automatically
server.port=${PORT:8080}

# File Upload Settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload-dir=./uploads
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
spring.mvc.static-path-pattern=/uploads/**

# Logging
logging.level.org.hibernate.SQL=ERROR
logging.level.org.springframework.web=INFO
